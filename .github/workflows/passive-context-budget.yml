# Passive Context Token Budget
#
# Enforces token budgets on passive context files (AGENTS.md, memory-index.md)
# per Vercel research recommendation (<8KB compressed per file).
#
# Runs scripts/validation/passive_context_budget.py in CI mode.
# Exit codes follow ADR-035: 0 = pass, 1 = budget exceeded, 2 = config error.
#
# IMPORTANT: This workflow runs on ALL PRs to satisfy required status checks,
# but skips actual validation when no relevant files are changed.

name: Passive Context Budget

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-paths:
    name: Detect changes
    # ADR-025: ARM runner for cost optimization
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      should-run: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.context || steps.filter.outputs.validator }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check path filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            context:
              - 'AGENTS.md'
              - '.serena/memories/memory-index.md'
            validator:
              - 'scripts/validation/passive_context_budget.py'
              - 'scripts/validation/token_budget.py'

  validate-budget:
    name: Validate budget
    needs: check-paths
    if: needs.check-paths.outputs.should-run == 'true'
    # ADR-025: ARM runner for cost optimization
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Run budget validation
        run: |
          python3 -m scripts.validation.passive_context_budget --ci

  skip-budget:
    name: Skip budget (no changes)
    needs: check-paths
    if: needs.check-paths.outputs.should-run != 'true'
    # ADR-025: ARM runner for cost optimization
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 1
    steps:
      - name: Checkout code
        # Required for dorny/paths-filter pattern consistency
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Skip message
        run: |
          echo "No passive context changes detected - skipping budget validation"
