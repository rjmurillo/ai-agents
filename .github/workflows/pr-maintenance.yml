name: PR Maintenance

on:
  schedule:
    - cron: '0 * * * *'  # Hourly at minute 0 (UTC)
  workflow_dispatch:     # Manual trigger
    inputs:
      max_prs:
        description: 'Max PRs to process'
        type: number
        default: 20
      process_conflicts:
        description: 'Auto-resolve merge conflicts'
        type: boolean
        default: true

# Issue #2520: least privilege. Only process-prs writes (push merges, comment
# on PRs); discover-prs and summarize are read-only. Job-level blocks below.
permissions:
  contents: read

concurrency:
  group: pr-maintenance
  cancel-in-progress: false

env:
  PR_MAX_PRS: ${{ inputs.max_prs || 20 }}

jobs:
  # Job 1: Discover PRs needing attention
  discover-prs:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has-prs: ${{ steps.discover.outputs.has-prs }}
      summary-json: ${{ steps.discover.outputs.summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check API rate limit
        id: ratelimit
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: python3 .github/scripts/test_rate_limit.py

      - name: Discover PRs needing attention
        id: discover
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          result=$(python3 .github/scripts/invoke_pr_maintenance.py --max-prs "$PR_MAX_PRS" --output-json)
          matrix_json=$(echo "$result" | jq -c '{include: .prs}')

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

          has_prs=$(echo "$result" | jq -r '.prs | length > 0')
          echo "has-prs=$has_prs" >> "$GITHUB_OUTPUT"

          echo "summary=$result" >> "$GITHUB_OUTPUT"

          echo "Found $(echo "$result" | jq -r '.summary.total') open PRs"
          echo "Action Required: $(echo "$result" | jq -r '.summary.actionRequired')"
          echo "With Conflicts: $(echo "$result" | jq '[.prs[] | select(.hasConflicts == true)] | length')"

      - name: Write step summary
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          SUMMARY_JSON: ${{ steps.discover.outputs.summary }}
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          # Issue #2520: discovery JSON carries PR-derived text (categories,
          # reasons); env-route instead of quoting into the script (CWE-78).
          $json = $env:SUMMARY_JSON
          $parsed = $json | ConvertFrom-Json

          $summary = @"
          ## PR Discovery Summary

          | Metric | Count |
          |--------|-------|
          | Open PRs Scanned | $($parsed.summary.total) |
          | PRs Need Action | $($parsed.summary.actionRequired) |
          | Blocked (human) | $($parsed.summary.blocked) |
          | Derivative PRs | $($parsed.summary.derivatives) |

          "@

          if ($parsed.prs.Count -gt 0) {
            $summary += @"

          ### PRs Requiring Action

          | PR | Category | Reason | Has Conflicts |
          |----|----------|--------|---------------|
          "@
            foreach ($pr in $parsed.prs) {
              $conflictIcon = if ($pr.hasConflicts) { ':warning:' } else { ':white_check_mark:' }
              $summary += "| #$($pr.number) | $($pr.category) | $($pr.reason) | $conflictIcon |`n"
            }
          }

          $summary | Out-File $env:GITHUB_STEP_SUMMARY -Append

  # Job 2: Process PRs in parallel (matrix strategy)
  process-prs:
    needs: discover-prs
    if: needs.discover-prs.outputs.has-prs == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    # The only job that mutates state: pushes merge commits, comments on PRs,
    # and the ai-review action reads workflow status (actions: read).
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    strategy:
      matrix: ${{ fromJson(needs.discover-prs.outputs.matrix) }}
      fail-fast: false
      max-parallel: 3

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "rjmurillo-bot"
          git config user.email "rjmurillo-bot@users.noreply.github.com"

      - name: Auto-resolve conflicts for PR #${{ matrix.number }}
        id: auto-resolve
        if: matrix.hasConflicts == true && (inputs.process_conflicts != false)
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          PR_NUMBER: ${{ matrix.number }}
          HEAD_REF: ${{ matrix.headRefName }}
          BASE_REF: ${{ matrix.baseRefName }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          Write-Host "Attempting auto-resolution for PR #$env:PR_NUMBER"
          Write-Host "Branch: $env:HEAD_REF -> $env:BASE_REF"

          # Issue #2519: the PowerShell Resolve-PRConflicts.ps1 was removed in the
          # ADR-042 Python migration; call the existing Python resolver instead.
          # Branch names flow through env (not run-block interpolation) to avoid
          # CWE-78 injection via crafted PR branch names.
          $result = python3 ./.claude/skills/merge-resolver/scripts/resolve_pr_conflicts.py `
            --owner $env:REPO_OWNER `
            --repo $env:REPO_NAME `
            --pr-number $env:PR_NUMBER `
            --branch-name $env:HEAD_REF `
            --target-branch $env:BASE_REF
          $resolverExit = $LASTEXITCODE

          # Resolver exit contract (resolve_pr_conflicts.py, ADR-035): 0 = all
          # conflicts auto-resolved, 1 = some files blocked. Both are expected
          # outcomes with JSON on stdout. Exit 2/3/4 = config/external/auth
          # error where stdout may not be JSON: fail the step loudly.
          if ($resolverExit -gt 1) {
            Write-Host "::error::PR #$($env:PR_NUMBER): resolver failed (exit $resolverExit): $result"
            exit $resolverExit
          }

          $parsed = $result | ConvertFrom-Json
          if ($parsed.success) {
            Write-Host "::notice::PR #$($env:PR_NUMBER): Auto-resolved - $($parsed.files_resolved.Count) file(s)"
            "needs_ai=false" | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "::warning::PR #$($env:PR_NUMBER): Auto-resolution blocked on: $($parsed.files_blocked -join ', ')"
            "needs_ai=true" | Out-File $env:GITHUB_OUTPUT -Append
            "blocked_files=$($parsed.files_blocked | ConvertTo-Json -Compress)" | Out-File $env:GITHUB_OUTPUT -Append
          }

          # Blocked resolution (resolver exit 1) is an expected outcome routed
          # to the AI steps via needs_ai, not a step failure: clear the lingering
          # $LASTEXITCODE so the step exits 0 (Cursor finding, PR #2545).
          exit 0

      - name: Prepare conflict context for AI analysis
        id: conflict-context
        if: steps.auto-resolve.outputs.needs_ai == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          HEAD_REF: ${{ matrix.headRefName }}
          BASE_REF: ${{ matrix.baseRefName }}
          BLOCKED_FILES_JSON: ${{ steps.auto-resolve.outputs.blocked_files }}
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          # Issue #2520: PR branch names are attacker-controllable; route them
          # through env, never expression interpolation in run blocks (CWE-78).
          # Checkout PR branch and attempt merge to get conflict state
          git fetch origin $env:HEAD_REF
          git checkout $env:HEAD_REF
          git fetch origin $env:BASE_REF

          # Attempt merge (will create conflict markers)
          $null = git merge "origin/$env:BASE_REF" 2>&1

          # Gather conflict context with git blame analysis
          $blockedFiles = $env:BLOCKED_FILES_JSON | ConvertFrom-Json
          $context = @()

          foreach ($file in $blockedFiles) {
            $context += "### File: $file"
            $context += ""
            $context += "#### Conflict markers:"
            $context += '```'
            $content = Get-Content $file -Raw -ErrorAction SilentlyContinue
            if ($content) {
              # Extract just the conflict sections
              $content -split "`n" | Where-Object { $_ -match '^(<<<<<<<|=======|>>>>>>>|[^<=>].*)' } |
                Select-Object -First 100 | ForEach-Object { $context += $_ }
            }
            $context += '```'
            $context += ""

            # Get recent commits for this file on both branches
            $context += "#### Recent commits (PR branch):"
            $context += '```'
            git log --oneline -5 HEAD -- $file 2>$null | ForEach-Object { $context += $_ }
            $context += '```'
            $context += ""
            $context += "#### Recent commits (base branch):"
            $context += '```'
            git log --oneline -5 "origin/$env:BASE_REF" -- $file 2>$null | ForEach-Object { $context += $_ }
            $context += '```'
            $context += ""
          }

          $contextStr = $context -join "`n"
          # Escape for GitHub Actions output
          $contextStr = $contextStr -replace '%', '%25' -replace "`n", '%0A' -replace "`r", '%0D'
          "conflict_context=$contextStr" | Out-File $env:GITHUB_OUTPUT -Append

          # Abort the merge so we can try again after AI analysis
          git merge --abort 2>$null

      - name: AI conflict analysis
        id: ai-analysis
        if: steps.auto-resolve.outputs.needs_ai == 'true'
        uses: ./.github/actions/ai-review
        with:
          agent: analyst
          context-type: pr-diff
          pr-number: ${{ matrix.number }}
          additional-context: |
            ## Merge Conflict Analysis Request

            The following files have conflicts that could not be auto-resolved:
            ${{ steps.auto-resolve.outputs.blocked_files }}

            ${{ steps.conflict-context.outputs.conflict_context }}
          prompt-file: .github/prompts/merge-conflict-analysis.md
          timeout-minutes: 5
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Apply AI conflict resolution
        if: steps.auto-resolve.outputs.needs_ai == 'true' && steps.ai-analysis.outputs.verdict == 'PASS'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          AI_FINDINGS: ${{ steps.ai-analysis.outputs.findings }}
          PR_NUMBER: ${{ matrix.number }}
          HEAD_REF: ${{ matrix.headRefName }}
          BASE_REF: ${{ matrix.baseRefName }}
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          # Issue #2520: branch names and PR number flow through env, not
          # expression interpolation (CWE-78 script injection via branch names).
          Write-Host "Applying AI-recommended conflict resolutions for PR #$env:PR_NUMBER"

          # Parse AI output to find resolutions JSON
          $findings = $env:AI_FINDINGS
          $resolutions = $null

          # Extract JSON from AI output (handle markdown code fences if present)
          $jsonContent = $findings
          # Remove markdown code fences if present (```json ... ```)
          if ($findings -match '```(?:json)?\s*([\s\S]*?)```') {
            $jsonContent = $Matches[1].Trim()
          }

          # Extract JSON object containing resolutions
          if ($jsonContent -match '\{[\s\S]*"resolutions"[\s\S]*\}') {
            try {
              $resolutions = $Matches[0] | ConvertFrom-Json
            } catch {
              Write-Host "::error::Failed to parse AI resolutions JSON: $_"
              Write-Host "::error::Raw JSON attempted: $($Matches[0].Substring(0, [Math]::Min(500, $Matches[0].Length)))"
              exit 1
            }
          }

          # Validate resolutions exist and are not empty
          if (-not $resolutions) {
            Write-Host "::error::No JSON object with 'resolutions' key found in AI output"
            exit 1
          }
          if (-not $resolutions.resolutions) {
            Write-Host "::error::AI output missing 'resolutions' array"
            exit 1
          }
          if ($resolutions.resolutions.Count -eq 0) {
            Write-Host "::error::AI returned empty resolutions array - cannot resolve conflicts"
            exit 1
          }

          # Checkout PR branch and merge
          git fetch origin $env:HEAD_REF
          git checkout $env:HEAD_REF
          git fetch origin $env:BASE_REF
          $null = git merge "origin/$env:BASE_REF" 2>&1

          # Apply each resolution
          foreach ($res in $resolutions.resolutions) {
            Write-Host "Resolving $($res.file) with strategy: $($res.strategy)"
            Write-Host "  Reasoning: $($res.reasoning)"

            switch ($res.strategy) {
              'theirs' {
                git checkout --theirs $res.file
                git add $res.file
              }
              'ours' {
                git checkout --ours $res.file
                git add $res.file
              }
              'combine' {
                if ($res.combined_content) {
                  $res.combined_content | Set-Content $res.file -NoNewline
                  git add $res.file
                } else {
                  Write-Host "::error::Combine strategy requires combined_content for $($res.file)"
                  exit 1
                }
              }
              default {
                Write-Host "::error::Unknown strategy: $($res.strategy)"
                exit 1
              }
            }
          }

          # Verify no remaining conflicts
          $remaining = git diff --name-only --diff-filter=U
          if ($remaining) {
            Write-Host "::error::Unresolved conflicts remain: $remaining"
            git merge --abort
            exit 1
          }

          # Commit and push
          git commit -m "Merge $env:BASE_REF into $env:HEAD_REF - AI-resolved conflicts"
          git push origin $env:HEAD_REF
          Write-Host "::notice::PR #$($env:PR_NUMBER): AI-resolved conflicts successfully"

      - name: Report unresolvable conflicts
        if: steps.auto-resolve.outputs.needs_ai == 'true' && steps.ai-analysis.outputs.verdict != 'PASS'
        env:
          PR_NUMBER: ${{ matrix.number }}
          AI_VERDICT: ${{ steps.ai-analysis.outputs.verdict }}
          BLOCKED_FILES: ${{ steps.auto-resolve.outputs.blocked_files }}
        run: |
          # Issue #2520: blocked_files carries PR-controlled file paths; route
          # through env, not run-block interpolation (CWE-78).
          echo "::error::PR #${PR_NUMBER}: Conflicts require manual resolution"
          echo "::error::AI verdict: ${AI_VERDICT}"
          echo "::error::Blocked files: ${BLOCKED_FILES}"
          echo "Use /merge-resolver ${PR_NUMBER} for manual resolution"
          exit 1

      # Detect human CHANGES_REQUESTED reviews: informational only, no longer gates bot.
      # Human-out-of-the-loop is the goal; the bot processes review comments unconditionally
      # when conflicts are clear (or were auto-resolved). See removal of triage:approved gate.
      - name: Detect human CHANGES_REQUESTED for PR #${{ matrix.number }}
        id: approval-gate
        if: |
          matrix.hasConflicts != true ||
          steps.auto-resolve.outputs.needs_ai != 'true' ||
          steps.ai-analysis.outputs.verdict == 'PASS'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          PR_NUMBER: ${{ matrix.number }}
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          $prData = gh pr view $env:PR_NUMBER --repo $env:GITHUB_REPOSITORY --json reviews --jq '{reviews: .reviews}'
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::Failed to fetch PR review data; proceeding without human-changes detection"
            "human_changes_requested=false" | Out-File $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $pr = $prData | ConvertFrom-Json
          $botAuthors = @('coderabbitai[bot]', 'github-actions[bot]', 'copilot-swe-agent[bot]', 'gemini-code-assist[bot]', 'rjmurillo-bot')
          $humanChangesRequested = $pr.reviews | Where-Object {
            $_.state -eq 'CHANGES_REQUESTED' -and $_.author.login -notin $botAuthors
          }
          if ($humanChangesRequested) {
            Write-Host "::warning::PR #$($env:PR_NUMBER): Human CHANGES_REQUESTED present; bot will still respond, but flagging for visibility"
            "human_changes_requested=true" | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            "human_changes_requested=false" | Out-File $env:GITHUB_OUTPUT -Append
          }

      - name: Process PR comments for PR #${{ matrix.number }}
        id: process-comments
        # Process review comments whenever conflicts are clear (or were auto-resolved).
        # The triage:approved human-approval gate has been removed; see PR #1841.
        if: |
          matrix.hasConflicts != true ||
          steps.auto-resolve.outputs.needs_ai != 'true' ||
          steps.ai-analysis.outputs.verdict == 'PASS'
        uses: ./.github/actions/ai-review
        with:
          agent: pr-comment-responder
          context-type: pr-diff
          pr-number: ${{ matrix.number }}
          prompt-file: .github/prompts/pr-comment-triage.md
          execute-script: .claude/skills/github/scripts/pr/invoke_pr_comment_processing.py
          timeout-minutes: 10
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Comment processing result
        if: steps.process-comments.outcome == 'success' || steps.process-comments.outcome == 'failure'
        env:
          PR_NUMBER: ${{ matrix.number }}
          STEP_OUTCOME: ${{ steps.process-comments.outcome }}
          AI_VERDICT: ${{ steps.process-comments.outputs.verdict }}
        run: |
          # Issue #2520: AI verdict is model output (untrusted); env-route it.
          echo "PR #${PR_NUMBER} comment processing: ${STEP_OUTCOME}"
          echo "Verdict: ${AI_VERDICT}"

  # Job 3: Post-processing summary
  summarize:
    needs: [discover-prs, process-prs]
    if: always()
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Final summary
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          $json = '${{ needs.discover-prs.outputs.summary-json }}'
          if (-not $json) {
            Write-Host "No discovery results available"
            exit 0
          }

          $parsed = $json | ConvertFrom-Json
          $actionRequired = @($parsed.prs | Where-Object { $_.category -eq 'agent-controlled' })

          if ($actionRequired.Count -gt 0) {
            $prNumbers = ($actionRequired | ForEach-Object { "#$($_.number)" }) -join ", "
            Write-Host "::notice::Action required for PRs: $prNumbers"
            Write-Host "Run: /pr-review $(($actionRequired | ForEach-Object { $_.number }) -join ',')"

            $summary = @"

          ---
          ### Next Steps

          The following PRs require manual review via ``/pr-review``:

          | PR | Reason | Action |
          |----|--------|--------|
          "@
            foreach ($pr in $actionRequired) {
              $summary += "| #$($pr.number) | $($pr.reason) | ``/pr-review $($pr.number)`` |`n"
            }

            $summary | Out-File $env:GITHUB_STEP_SUMMARY -Append
          }
