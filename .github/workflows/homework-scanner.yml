name: Homework Scanner

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: homework-scanner-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Scan PR for homework items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -m scripts.homework_scanner \
            --pr "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --output homework-results.json

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homework-scan-results
          path: homework-results.json
          retention-days: 30
          if-no-files-found: ignore
