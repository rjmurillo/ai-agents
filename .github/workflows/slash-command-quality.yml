name: Slash Command Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-paths:
    runs-on: ubuntu-24.04-arm
    permissions:
      pull-requests: read
    outputs:
      should-run: ${{ steps.filter.outputs.commands == 'true' || steps.filter.outputs.validator == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for relevant changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            commands:
              - '.claude/commands/**/*.md'
            validator:
              - '.claude/skills/slashcommandcreator/scripts/validate_slash_command.py'
              - 'scripts/modules/slash_command_validator.py'

  validate-slash-commands:
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: needs.check-paths.outputs.should-run == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup code environment
        uses: ./.github/actions/setup-code-env
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pester: false
          enable-git-hooks: false

      - name: Validate slash commands
        run: python3 -c "from scripts.modules.slash_command_validator import invoke_slash_command_validation; raise SystemExit(invoke_slash_command_validation())"

  skip-validation:
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: needs.check-paths.outputs.should-run != 'true'
    permissions: {}
    steps:
      - name: Skip validation
        run: echo "No slash command changes detected, skipping validation"
