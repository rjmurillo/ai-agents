# Agent Drift Detection (CI)
#
# Diff-linting workflow that detects when generated platform-specific agent files
# have drifted from their source templates. Runs on PRs that modify agent files.
#
# This workflow is part of Phase 2 of the agent consolidation epic.
# See: .agents/roadmap/epic-agent-consolidation.md
#
# How it works:
#   1. Regenerates all platform-specific files from source templates
#   2. Compares regenerated output with committed files
#   3. Fails CI if semantic drift is detected
#   4. Provides an actionable diff showing exactly what diverged
#
# Bypass procedure (intentional divergence):
#   If you intentionally want a generated file to differ from its template:
#   1. Add [skip-drift-check] anywhere in a commit message on the PR
#   2. Document the reason in your PR description
#   3. Update templates/README.md to record the intentional difference
#   4. Ensure the PR has explicit code-owner approval
#
# Running locally:
#   pwsh -NoProfile ./build/Generate-Agents.ps1 -Validate

name: Agent Drift Detection (CI)

on:
  pull_request:
    branches:
      - main
    # NO paths filter here — handled internally via dorny/paths-filter so that
    # required status checks still pass on PRs that don't touch agent files.
  workflow_dispatch: # Allow manual triggering for debugging

concurrency:
  group: agent-drift-detection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: Determine whether validation is needed ────────────────────────
  check-paths:
    name: Agent Drift Detection
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      should-validate: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.determine.outputs.should-validate }}
      bypass-requested: ${{ steps.bypass.outputs.bypass-requested }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Need full history to inspect commit messages for bypass markers
          fetch-depth: 0

      - name: Check for bypass marker in commit messages
        id: bypass
        if: github.event_name != 'workflow_dispatch'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Check all commits in this PR for [skip-drift-check]
          BYPASS=$(git log "$BASE_SHA..$HEAD_SHA" --format="%s %b" | grep -c '\[skip-drift-check\]' || true)
          if [ "$BYPASS" -gt 0 ]; then
            echo "bypass-requested=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Bypass marker [skip-drift-check] detected in commit message(s)."
          else
            echo "bypass-requested=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for relevant file changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            agents:
              - 'templates/**'
              - 'src/vs-code-agents/**'
              - 'src/copilot-cli/**'
              - 'build/Generate-Agents.ps1'
              - 'build/Generate-Agents.Common.psm1'
              - '.github/workflows/agent-drift-detection.yml'

      - name: Determine if validation should run
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-validate=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (manual trigger)"
          elif [ "${{ steps.filter.outputs.agents }}" = "true" ]; then
            echo "should-validate=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (agent files changed)"
          else
            echo "should-validate=false" >> "$GITHUB_OUTPUT"
            echo "Decision: Skip validation (no agent files changed)"
          fi

  # ─── Phase 2: Validate — only when relevant files changed ───────────────────
  validate:
    name: Agent Drift Detection
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    # Run when validation is needed AND no bypass was requested
    if: |
      needs.check-paths.outputs.should-validate == 'true' &&
      needs.check-paths.outputs.bypass-requested != 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Regenerate and validate agent files
        id: validate
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          Write-Host "Running agent generation in validation mode..."
          Write-Host "This regenerates all platform-specific files from source templates"
          Write-Host "and compares them against committed files."
          Write-Host ""

          ./build/Generate-Agents.ps1 -Validate

      - name: Show diff on failure
        if: failure() && steps.validate.conclusion == 'failure'
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════" -ForegroundColor Red
          Write-Host "  AGENT DRIFT DETECTED" -ForegroundColor Red
          Write-Host "═══════════════════════════════════════════════════════════" -ForegroundColor Red
          Write-Host ""
          Write-Host "Generated agent files do not match the committed files." -ForegroundColor Yellow
          Write-Host "This means someone edited a generated file directly, bypassing"
          Write-Host "the source template."
          Write-Host ""

          # Regenerate without validation mode to get the expected content in working tree
          ./build/Generate-Agents.ps1

          # Show which files drifted
          $changedFiles = git diff --name-only
          if ($changedFiles) {
            Write-Host "─── Files with semantic drift ───────────────────────────" -ForegroundColor Red
            foreach ($file in $changedFiles) {
              Write-Host "  ✗  $file" -ForegroundColor Yellow
            }
            Write-Host ""

            # Separate frontmatter drift from content drift
            $frontmatterDrift = @()
            $contentDrift = @()
            foreach ($file in $changedFiles) {
              $diff = git diff -- $file
              # Frontmatter is within the first --- block
              if ($diff -match "^[+-]---" -or $diff -match "^[+-][a-z_]+:") {
                $frontmatterDrift += $file
              } else {
                $contentDrift += $file
              }
            }

            if ($frontmatterDrift.Count -gt 0) {
              Write-Host "─── Frontmatter drift ───────────────────────────────────" -ForegroundColor Magenta
              foreach ($file in $frontmatterDrift) {
                Write-Host "  $file" -ForegroundColor White
              }
              Write-Host ""
            }

            if ($contentDrift.Count -gt 0) {
              Write-Host "─── Content drift ───────────────────────────────────────" -ForegroundColor Magenta
              foreach ($file in $contentDrift) {
                Write-Host "  $file" -ForegroundColor White
              }
              Write-Host ""
            }

            Write-Host "─── How to fix ──────────────────────────────────────────" -ForegroundColor Cyan
            Write-Host ""
            Write-Host "  1. Edit the source template (NOT the generated file):" -ForegroundColor White
            Write-Host "       templates/agents/<agent-name>.shared.md" -ForegroundColor Gray
            Write-Host ""
            Write-Host "  2. Regenerate platform-specific files:" -ForegroundColor White
            Write-Host "       pwsh -NoProfile build/Generate-Agents.ps1" -ForegroundColor Gray
            Write-Host ""
            Write-Host "  3. Commit the regenerated files:" -ForegroundColor White
            Write-Host "       git add src/vs-code-agents/ src/copilot-cli/" -ForegroundColor Gray
            Write-Host "       git commit -m 'fix(agents): regenerate from updated template'" -ForegroundColor Gray
            Write-Host ""
            Write-Host "─── Bypass procedure (intentional divergence) ───────────" -ForegroundColor Cyan
            Write-Host ""
            Write-Host "  If this divergence is intentional:" -ForegroundColor White
            Write-Host "  1. Add [skip-drift-check] to a commit message in this PR" -ForegroundColor Gray
            Write-Host "  2. Document the reason in your PR description" -ForegroundColor Gray
            Write-Host "  3. Update templates/README.md with the intentional difference" -ForegroundColor Gray
            Write-Host "  4. Ensure explicit code-owner approval on this PR" -ForegroundColor Gray
            Write-Host ""
            Write-Host "─── Detailed diff ───────────────────────────────────────" -ForegroundColor Red
            Write-Host ""
            git diff
          }

      - name: Write job summary
        if: always()
        shell: pwsh -NoProfile -Command "& '{0}'"
        run: |
          $outcome = "${{ steps.validate.conclusion }}"
          $summary = @()

          if ($outcome -eq "success") {
            $summary += "## ✅ Agent Drift Detection Passed"
            $summary += ""
            $summary += "All generated agent files match their source templates."
          } else {
            $summary += "## ❌ Agent Drift Detection Failed"
            $summary += ""
            $summary += "Generated agent files have drifted from their source templates."
            $summary += ""
            $summary += "### Fix"
            $summary += "1. Edit the source template in ``templates/agents/*.shared.md``"
            $summary += "2. Run: ``pwsh -NoProfile build/Generate-Agents.ps1``"
            $summary += "3. Commit the regenerated files"
          }

          $summary += ""
          $summary += "### Monitored Paths"
          $summary += "- ``templates/``  — source templates"
          $summary += "- ``src/vs-code-agents/``  — generated VS Code agents"
          $summary += "- ``src/copilot-cli/``  — generated Copilot CLI agents"

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  # ─── Bypass warning — runs instead of validate when bypass is active ─────────
  bypass-warning:
    name: Agent Drift Detection
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: |
      needs.check-paths.outputs.should-validate == 'true' &&
      needs.check-paths.outputs.bypass-requested == 'true'
    permissions:
      contents: read

    steps:
      - name: Bypass acknowledged — drift check skipped
        run: |
          echo "⚠️  Agent drift detection bypassed via [skip-drift-check] commit marker."
          echo ""
          echo "This check has been intentionally skipped for this PR."
          echo ""
          echo "Bypass requirements:"
          echo "  ✔  [skip-drift-check] marker present in a commit message"
          echo "  ☐  Reason documented in PR description"
          echo "  ☐  templates/README.md updated with intentional difference"
          echo "  ☐  Explicit code-owner approval obtained"
          echo ""
          echo "Status: PASS (bypassed — manual approval required)"

      - name: Write bypass summary
        run: |
          echo "## ⚠️ Agent Drift Detection — Bypassed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Drift detection was skipped because a \`[skip-drift-check]\` marker was found in a commit message." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bypass checklist:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] Reason documented in PR description" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] \`templates/README.md\` updated with intentional difference" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] Explicit code-owner approval obtained" >> "$GITHUB_STEP_SUMMARY"

  # ─── Skip job — provides passing status when no agent files changed ──────────
  # Uses the SAME NAME as the real validation job so required status checks pass.
  # (Dual-job same-name pattern from Issue #335)
  skip:
    name: Agent Drift Detection
    needs: check-paths
    if: needs.check-paths.outputs.should-validate != 'true'
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Skip validation (no agent files changed)
        run: |
          echo "✅ Agent drift detection skipped — no relevant file changes detected"
          echo ""
          echo "This PR only contains changes to files that don't affect generated agents."
          echo ""
          echo "Monitored paths that would trigger validation:"
          echo "  - templates/**"
          echo "  - src/vs-code-agents/**"
          echo "  - src/copilot-cli/**"
          echo "  - build/Generate-Agents.ps1"
          echo "  - build/Generate-Agents.Common.psm1"
          echo "  - .github/workflows/agent-drift-detection.yml"
          echo ""
          echo "Status: PASS (skipped — no relevant changes)"
