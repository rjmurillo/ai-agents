# Agent Drift Detection (CI)
#
# Diff-linting workflow that detects when generated platform-specific agent files
# have drifted from their source templates. Runs on PRs that modify agent files.
#
# This workflow is part of Phase 2 of the agent consolidation epic.
# See: .agents/roadmap/epic-agent-consolidation.md
#
# How it works:
#   1. Regenerates all platform-specific files from source templates
#   2. Compares regenerated output with committed files
#   3. Fails CI if semantic drift is detected
#   4. Provides an actionable diff showing exactly what diverged
#
# Bypass procedure (intentional divergence):
#   If you intentionally want a generated file to differ from its template:
#   1. Add [skip-drift-check] anywhere in a commit message on the PR
#   2. Document the reason in your PR description
#   3. Update templates/README.md to record the intentional difference
#   4. Ensure the PR has explicit code-owner approval
#
# Running locally:
#   python3 build/generate_agents.py --validate

name: Agent Drift Detection (CI)

on:
  pull_request:
    branches:
      - main
    # NO paths filter here. Handled internally via dorny/paths-filter so that
    # required status checks still pass on PRs that don't touch agent files.
  workflow_dispatch: # Allow manual triggering for debugging

concurrency:
  group: agent-drift-detection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: Determine whether validation is needed ────────────────────────
  check-paths:
    name: Agent Drift Detection
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    outputs:
      should-validate: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.determine.outputs.should-validate }}
      bypass-requested: ${{ steps.bypass.outputs.bypass-requested }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          # Need full history to inspect commit messages for bypass markers
          fetch-depth: 0

      - name: Check for bypass marker in commit messages
        id: bypass
        if: github.event_name != 'workflow_dispatch'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Check all commits in this PR for [skip-drift-check]
          BYPASS=$(git log "$BASE_SHA..$HEAD_SHA" --format="%s %b" | grep -c '\[skip-drift-check\]' || true)
          if [ "$BYPASS" -gt 0 ]; then
            echo "bypass-requested=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Bypass marker [skip-drift-check] detected in commit message(s)."
          else
            echo "bypass-requested=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for relevant file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            agents:
              - 'templates/**'
              - 'src/vs-code-agents/**'
              - 'src/copilot-cli/**'
              - 'build/generate_agents.py'
              - '.github/workflows/agent-drift-detection.yml'

      - name: Determine if validation should run
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-validate=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (manual trigger)"
          elif [ "${{ steps.filter.outputs.agents }}" = "true" ]; then
            echo "should-validate=true" >> "$GITHUB_OUTPUT"
            echo "Decision: Run validation (agent files changed)"
          else
            echo "should-validate=false" >> "$GITHUB_OUTPUT"
            echo "Decision: Skip validation (no agent files changed)"
          fi

  # ─── Phase 2: Validate, only when relevant files changed ────────────────────
  validate:
    name: Agent Drift Detection
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    # Run when validation is needed AND no bypass was requested
    if: |
      needs.check-paths.outputs.should-validate == 'true' &&
      needs.check-paths.outputs.bypass-requested != 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Regenerate and validate agent files
        id: validate
        shell: bash
        run: |
          echo "Running agent generation in validation mode..."
          echo "This regenerates all platform-specific files from source templates"
          echo "and compares them against committed files."
          echo ""

          python3 build/generate_agents.py --validate

      - name: Build-all staleness check (Issue #2222)
        id: build-all-check
        if: success() || failure()
        # Run build_all.py --check to catch plugin lib mirror drift that
        # generate_agents.py does not cover. This closes the gap where
        # PR #2203 added scripts/ai_review_common/cache_guard.py but did
        # not commit the generated src/copilot-cli/lib/ copy.
        # Exit 2 = staleness detected.
        shell: bash
        run: |
          echo "Running build_all.py --check..."
          python3 build/scripts/build_all.py --check

      - name: Plugin manifest version parity check (Issue #2222)
        id: manifest-parity-check
        if: success() || failure()
        # Both `.claude/.claude-plugin/plugin.json` and
        # `src/copilot-cli/.claude-plugin/plugin.json` must declare
        # identical `version` fields. Exit 2 on mismatch, 0 on parity.
        shell: bash
        run: |
          echo "Running validate_plugin_manifests_version_parity.py..."
          python3 build/scripts/validate_plugin_manifests_version_parity.py

      - name: Show diff on failure
        if: failure() && (steps.validate.conclusion == 'failure' || steps.build-all-check.conclusion == 'failure' || steps.manifest-parity-check.conclusion == 'failure')
        shell: bash
        run: |
          echo ""
          echo "==========================================================="
          echo "  DRIFT DETECTED"
          echo "==========================================================="
          echo ""

          if [ "${{ steps.validate.conclusion }}" = "failure" ]; then
            echo "--- Agent files drift ---"
            echo "Generated agent files do not match the committed files."
            echo "This means someone edited a generated file directly, bypassing"
            echo "the source template."
            echo ""

            # Regenerate without validation mode to get the expected content in working tree
            python3 build/generate_agents.py

            # Show which files drifted
            changed_files=$(git diff --name-only)
            if [ -n "$changed_files" ]; then
              echo "Files with semantic drift:"
              echo "$changed_files" | while read -r file; do
                echo "  x  $file"
              done
              echo ""

              echo "How to fix:"
              echo "  1. Edit the source template (NOT the generated file):"
              echo "       templates/agents/<agent-name>.shared.md"
              echo "  2. Regenerate platform-specific files:"
              echo "       python3 build/generate_agents.py"
              echo "  3. Commit the regenerated files:"
              echo "       git add src/vs-code-agents/ src/copilot-cli/"
              echo "       git commit -m 'fix(agents): regenerate from updated template'"
              echo ""
              git diff
            fi
          fi

          if [ "${{ steps.build-all-check.conclusion }}" = "failure" ]; then
            echo ""
            echo "--- Build-all staleness detected ---"
            echo "Generated plugin lib mirrors or agent artifacts are stale."
            echo ""
            echo "How to fix:"
            echo "  1. Regenerate all artifacts:"
            echo "       python3 build/scripts/build_all.py"
            echo "  2. Commit the regenerated files"
            echo ""
          fi

          if [ "${{ steps.manifest-parity-check.conclusion }}" = "failure" ]; then
            echo ""
            echo "--- Manifest version mismatch detected ---"
            echo "Plugin manifests have different version fields."
            echo ""
            echo "How to fix:"
            echo "  1. Update stale manifest to match:"
            echo "       vim .claude/.claude-plugin/plugin.json"
            echo "       vim src/copilot-cli/.claude-plugin/plugin.json"
            echo "  2. Commit the updated manifest(s)"
            echo ""
          fi

          echo ""
          echo "--- Bypass procedure (intentional divergence) ---"
          echo ""
          echo "  If this divergence is intentional:"
          echo "  1. Add [skip-drift-check] to a commit message in this PR"
          echo "  2. Document the reason in your PR description"
          echo "  3. Update templates/README.md with the intentional difference"
          echo "  4. Ensure explicit code-owner approval on this PR"

      - name: Write job summary
        if: always()
        shell: bash
        env:
          VALIDATE_CONCLUSION: ${{ steps.validate.conclusion }}
          BUILD_ALL_CONCLUSION: ${{ steps.build-all-check.conclusion }}
          MANIFEST_PARITY_CONCLUSION: ${{ steps.manifest-parity-check.conclusion }}
        run: |
          if [ "$VALIDATE_CONCLUSION" = "success" ] && [ "$BUILD_ALL_CONCLUSION" = "success" ] && [ "$MANIFEST_PARITY_CONCLUSION" = "success" ]; then
            {
              echo "## Drift Detection Passed"
              echo ""
              echo "✓ Agent files match source templates"
              echo "✓ Build-all artifacts are fresh"
              echo "✓ Plugin manifest versions match"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Drift Detection Failed"
              echo ""
              if [ "$VALIDATE_CONCLUSION" = "failure" ]; then
                echo "✗ Agent files drift: generated files have drifted from templates"
              fi
              if [ "$BUILD_ALL_CONCLUSION" = "failure" ]; then
                echo "✗ Build-all staleness: plugin lib mirrors or agent artifacts are stale"
              fi
              if [ "$MANIFEST_PARITY_CONCLUSION" = "failure" ]; then
                echo "✗ Manifest version mismatch: plugin manifests have different versions"
              fi
              echo ""
              echo "### How to Fix"
              echo "1. For agent drift: Edit \`templates/agents/*.shared.md\`, then run \`python3 build/generate_agents.py\`"
              echo "2. For build-all staleness: Run \`python3 build/scripts/build_all.py\`"
              echo "3. For manifest mismatch: Update stale manifest version field to match"
              echo "4. Commit the regenerated/updated files"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo ""
            echo "### Monitored Paths"
            echo "- \`templates/\` - source templates"
            echo "- \`src/vs-code-agents/\` - generated VS Code agents"
            echo "- \`src/copilot-cli/\` - generated Copilot CLI agents + lib mirrors"
            echo "- \`.claude/.claude-plugin/plugin.json\` - Claude plugin manifest"
            echo "- \`src/copilot-cli/.claude-plugin/plugin.json\` - Copilot plugin manifest"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Bypass warning, runs instead of validate when bypass is active ──────────
  bypass-warning:
    name: Agent Drift Detection
    runs-on: ubuntu-24.04-arm
    needs: check-paths
    if: |
      needs.check-paths.outputs.should-validate == 'true' &&
      needs.check-paths.outputs.bypass-requested == 'true'
    permissions:
      contents: read

    steps:
      - name: Bypass acknowledged, drift check skipped
        run: |
          echo "⚠️  Agent drift detection bypassed via [skip-drift-check] commit marker."
          echo ""
          echo "This check has been intentionally skipped for this PR."
          echo ""
          echo "Bypass requirements:"
          echo "  ✔  [skip-drift-check] marker present in a commit message"
          echo "  ☐  Reason documented in PR description"
          echo "  ☐  templates/README.md updated with intentional difference"
          echo "  ☐  Explicit code-owner approval obtained"
          echo ""
          echo "Status: PASS (bypassed, manual approval required)"

      - name: Write bypass summary
        run: |
          echo "## Agent Drift Detection - Bypassed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Drift detection was skipped because a \`[skip-drift-check]\` marker was found in a commit message." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bypass checklist:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] Reason documented in PR description" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] \`templates/README.md\` updated with intentional difference" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] Explicit code-owner approval obtained" >> "$GITHUB_STEP_SUMMARY"

  # ─── Skip job, provides passing status when no agent files changed ───────────
  # Uses the SAME NAME as the real validation job so required status checks pass.
  # (Dual-job same-name pattern from Issue #335)
  skip:
    name: Agent Drift Detection
    needs: check-paths
    if: needs.check-paths.outputs.should-validate != 'true'
    # ADR-025: ARM runner for cost optimization (37.5% savings vs x64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Skip validation (no agent files changed)
        run: |
          echo "Agent drift detection skipped. No relevant file changes detected."
          echo ""
          echo "This PR only contains changes to files that don't affect generated agents."
          echo ""
          echo "Monitored paths that would trigger validation:"
          echo "  - templates/**"
          echo "  - src/vs-code-agents/**"
          echo "  - src/copilot-cli/**"
          echo "  - build/generate_agents.py"
          echo "  - .github/workflows/agent-drift-detection.yml"
          echo ""
          echo "Status: PASS (skipped, no relevant changes)"
