# Copilot CLI Platform Configuration
# Used by Generate-Agents.ps1 to transform shared sources

platform: copilot-cli
outputDir: src/copilot-cli
fileExtension: .agent.md

# Frontmatter settings
frontmatter:
  # Copilot CLI model: use CLI model identifiers (not VS Code display names)
  model: "claude-opus-4.6"
  # Copilot CLI requires name field
  includeNameField: true

# Per-agent model tier mappings (used when template specifies model_tier)
model_tiers:
  opus: "claude-opus-4.6"
  sonnet: "claude-sonnet-4.6"
  haiku: "claude-haiku-4.5"

# Agent handoff syntax
handoffSyntax: "/agent"

# Tool syntax style
toolSyntax: path

# Memory protocol prefix (for MCP tools)
memoryPrefix: "serena/"
